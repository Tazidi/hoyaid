name: hoyaid
description: "Aplikasi klasifikasi dan pemetaan sebaran spesies Hoya"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  cloud_functions: ^5.1.3
  firebase_app_check: ^0.3.1+4
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3

  # Google Sign-In
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Localization & Formatting
  intl: ^0.19.0

  # Media Picker
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  geolocator: ^13.0.1
  image: ^4.2.0
  tflite_flutter: ^0.11.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ML Kit - plant/object filter (pre-classification gate)
  google_mlkit_image_labeling: ^0.14.2

  # Icons
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.0
  flutter_local_notifications: ^17.2.4
  path_provider: ^2.1.5
  rxdart: ^0.28.0
  shared_preferences: ^2.3.2
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/iHoya.png
    - assets/models/
